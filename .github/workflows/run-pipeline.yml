name: Run SupplyChain Disruption Monitor Pipeline

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Multi-Agent Pipeline
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "🔍 Running Monitor Agent..."
        python backend/monitor_agent.py
        
        echo "🧠 Running Risk Analyst Agent..."
        python backend/risk_agent.py
        
        echo "⚡ Running Action Agent..."
        python backend/action_agent.py
        
        echo "✅ Pipeline run completed successfully!"
